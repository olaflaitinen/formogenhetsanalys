coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 1%
    patch:
      default:
        target: 85%
        threshold: 2%

comment:
  layout: "reach, diff, flags, components"
  behavior: default
  require_changes: false

ignore:
  - "tests/"
  - "benchmarks/"
  - "scripts/"
  - "docs/"
  - "stata/"
  - "R/"
  - "replication/"
